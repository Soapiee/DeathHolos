name: DeathHolos
main: me.soapiee.deathholos.DeathHolos
version: 1.0.0
author: Soapiee
prefix: DeathHolos

dependencies: [ ]
softdepend: [ "PlaceholderAPI" ]
api-version: 1.13

commands:
